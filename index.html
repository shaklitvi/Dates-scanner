<script>
let stream = null;
let facingMode = 'environment';
let params = {};

// ─── Ripeness Slider ───
(function initRipenSlider() {
  const handles = document.getElementById('ripenHandles');
  const lowH = document.getElementById('ripenLow');
  const highH = document.getElementById('ripenHigh');
  const display = document.getElementById('ripenValDisplay');
  let dragging = null;
  let lowVal = 3, highVal = 7;

  function setHandlePos(el, val) {
    const pct = ((val - 1) / 9) * 100;
    el.style.right = `calc(${pct}% - 14px)`;
  }

  function update() {
    setHandlePos(lowH, lowVal);
    setHandlePos(highH, highVal);
    lowH.textContent = lowVal;
    highH.textContent = highVal;
    const lo = Math.min(lowVal, highVal);
    const hi = Math.max(lowVal, highVal);
    display.textContent = `טווח: ${lo} – ${hi}`;
  }

  function getX(e) {
    return e.touches ? e.touches[0].clientX : e.clientX;
  }

  function startDrag(el, isLow) {
    return function(e) {
      dragging = { el, isLow };
      e.preventDefault();
    };
  }

  function onMove(e) {
    if (!dragging) return;
    const rect = handles.getBoundingClientRect();
    const x = getX(e);
    const pct = 1 - Math.max(0, Math.min(1, (x - rect.left) / rect.width));
    const val = Math.round(1 + pct * 9);
    if (dragging.isLow) lowVal = val;
    else highVal = val;
    update();
    e.preventDefault();
  }

  function endDrag() { dragging = null; }

  lowH.addEventListener('touchstart', startDrag(lowH, true), { passive: false });
  highH.addEventListener('touchstart', startDrag(highH, false), { passive: false });
  lowH.addEventListener('mousedown', startDrag(lowH, true));
  highH.addEventListener('mousedown', startDrag(highH, false));

  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchend', endDrag);
  document.addEventListener('mouseup', endDrag);

  // Initial position after layout
  setTimeout(update, 50);
  window.addEventListener('load', update);

  window.getRipenValues = () => ({
    min: Math.min(lowVal, highVal),
    max: Math.max(lowVal, highVal)
  });
})();

// ─── Screens ───
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function getParams() {
  const r = window.getRipenValues();
  return {
    lenMin: parseFloat(document.getElementById('lenMin').value) || 30,
    lenMax: parseFloat(document.getElementById('lenMax').value) || 60,
    widMin: parseFloat(document.getElementById('widMin').value) || 18,
    widMax: parseFloat(document.getElementById('widMax').value) || 35,
    wtMin: parseFloat(document.getElementById('wtMin').value) || 8,
    wtMax: parseFloat(document.getElementById('wtMax').value) || 25,
    ripenMin: r.min,
    ripenMax: r.max
  };
}

// ─── Camera ───
async function startCamera() {
  params = getParams();
  showScreen('camera');
  document.getElementById('paramsBadge').innerHTML =
    `📏 <b>${params.lenMin}–${params.lenMax}</b>מ"מ &nbsp;|&nbsp; ⚖️ <b>${params.wtMin}–${params.wtMax}</b>ג &nbsp;|&nbsp; 🌡️ <b>${params.ripenMin}–${params.ripenMax}</b>`;

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facingMode }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
  } catch (err) {
    toast('שגיאת מצלמה: ' + err.message);
    showScreen('settings');
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  showScreen('settings');
}

async function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  if (stream) stream.getTracks().forEach(t => t.stop());
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facingMode } },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
  } catch (e) { toast('לא הצלחתי להחליף מצלמה'); }
}

async function captureAndAnalyze() {
  const video = document.getElementById('video');
  if (!video.videoWidth) { toast('המצלמה עדיין נטענת'); return; }
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const base64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

  showLoading(true);
  try {
    const result = await analyzeWithClaude(base64, params);
    showLoading(false);
    showResult(base64, result);
  } catch (err) {
    showLoading(false);
    toast('שגיאה: ' + err.message);
  }
}

async function analyzeWithClaude(imageBase64, p) {
  const prompt = `אתה מומחה לבדיקת תמרים. נתח את התמונה ומצא את כל התמרים הגלויים. החזר JSON בלבד:

{
  "dates": [
    {
      "id": 1,
      "length_mm": <מספר>,
      "width_mm": <מספר>,
      "weight_g": <מספר>,
      "ripeness": <1-10>,
      "ripeness_desc": "<תיאור קצר בעברית>",
      "bbox_pct": { "x": <0-100>, "y": <0-100>, "w": <0-100>, "h": <0-100> },
      "confidence": <0-100>
    }
  ],
  "scene_notes": "<הערה כללית>"
}

פרמטרי הסינון: אורך ${p.lenMin}–${p.lenMax}מ"מ, רוחב ${p.widMin}–${p.widMax}מ"מ, משקל ${p.wtMin}–${p.wtMax}ג, שילפוח ${p.ripenMin}–${p.ripenMax}/10.
החזר JSON בלבד, ללא טקסט נוסף.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imageBase64 } },
          { type: 'text', text: prompt }
        ]
      }]
    })
  });

  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error?.message || 'שגיאת API');
  }

  const data = await res.json();
  const raw = data.content.map(b => b.text || '').join('');
  const clean = raw.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

function showResult(imageBase64, data) {
  const dates = data.dates || [];
  const p = params;

  const classified = dates.map(d => {
    const fails = [];
    if (d.length_mm < p.lenMin || d.length_mm > p.lenMax)
      fails.push(`אורך ${d.length_mm}מ"מ`);
    if (d.width_mm < p.widMin || d.width_mm > p.widMax)
      fails.push(`רוחב ${d.width_mm}מ"מ`);
    if (d.weight_g < p.wtMin || d.weight_g > p.wtMax)
      fails.push(`משקל ${d.weight_g}ג`);
    if (d.ripeness < p.ripenMin || d.ripeness > p.ripenMax)
      fails.push(`שילפוח ${d.ripeness}/10`);
    return { ...d, pass: fails.length === 0, fails };
  });

  const passCount = classified.filter(d => d.pass).length;
  const failCount = classified.length - passCount;

  const imgWrap = document.getElementById('resultImgWrap');
  const img = document.getElementById('result-img');
  img.src = 'data:image/jpeg;base64,' + imageBase64;
  imgWrap.querySelectorAll('.date-box').forEach(el => el.remove());

  img.onload = () => {
    setTimeout(() => {
      const w = img.offsetWidth, h = img.offsetHeight;
      classified.forEach(d => {
        if (!d.bbox_pct) return;
        const b = d.bbox_pct;
        const el = document.createElement('div');
        el.className = 'date-box ' + (d.pass ? 'pass' : 'fail');
        el.style.left = (b.x / 100 * w) + 'px';
        el.style.top = (b.y / 100 * h) + 'px';
        el.style.width = (b.w / 100 * w) + 'px';
        el.style.height = (b.h / 100 * h) + 'px';
        el.textContent = (d.pass ? '✓ #' : '✗ #') + d.id;
        imgWrap.appendChild(el);
      });
    }, 50);
  };

  const body = document.getElementById('resultBody');
  body.innerHTML = `
    <div class="summary-row">
      <div class="summary-chip chip-total">
        <div class="summary-chip-num">${classified.length}</div>
        <div class="summary-chip-label">תמרים זוהו</div>
      </div>
      <div class="summary-chip chip-pass">
        <div class="summary-chip-num">${passCount}</div>
        <div class="summary-chip-label">עוברים</div>
      </div>
      <div class="summary-chip chip-fail">
        <div class="summary-chip-num">${failCount}</div>
        <div class="summary-chip-label">נפסלים</div>
      </div>
    </div>
    ${data.scene_notes ? `<div style="color:var(--text-muted);font-size:12px;margin-bottom:12px;padding:0 4px">${data.scene_notes}</div>` : ''}
    <div class="date-list-title">פירוט תמרים</div>
    ${classified.map(d => `
      <div class="date-row ${d.pass ? 'pass' : 'fail'}">
        <div class="date-row-idx">${d.id}</div>
        <div class="date-row-details">
          <div class="date-row-name">${d.ripeness_desc || 'תמר'}</div>
          <div class="date-row-metrics">
            <span class="metric-chip ${inRange(d.length_mm,p.lenMin,p.lenMax)?'good':'bad'}">📏 ${d.length_mm}מ"מ</span>
            <span class="metric-chip ${inRange(d.width_mm,p.widMin,p.widMax)?'good':'bad'}">↔ ${d.width_mm}מ"מ</span>
            <span class="metric-chip ${inRange(d.weight_g,p.wtMin,p.wtMax)?'good':'bad'}">⚖️ ${d.weight_g}ג</span>
            <span class="metric-chip ${inRange(d.ripeness,p.ripenMin,p.ripenMax)?'good':'bad'}">🌡️ ${d.ripeness}/10</span>
          </div>
          ${!d.pass ? `<div class="fail-reasons">${d.fails.join(' • ')}</div>` : ''}
        </div>
        <div class="date-row-status">${d.pass ? '✅' : '❌'}</div>
      </div>
    `).join('')}
  `;

  document.getElementById('result-overlay').classList.add('show');
}

function inRange(v, min, max) { return v >= min && v <= max; }

function closeResult() {
  document.getElementById('result-overlay').classList.remove('show');
}

function showLoading(v) {
  document.getElementById('loading-overlay').classList.toggle('show', v);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
