<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a0a00">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>תמר סקאן</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c8860a;
    --gold-light: #f0a820;
    --gold-pale: #ffd97020;
    --brown: #3d1a00;
    --dark: #0e0600;
    --surface: #1c0d00;
    --surface2: #2a1200;
    --text: #f5e6c8;
    --text-muted: #9a7a50;
    --success: #4caf50;
    --fail: #e53935;
    --warn: #ff9800;
    --radius: 16px;
  }

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
background: var(–dark);
color: var(–text);
font-family: ‘Heebo’, sans-serif;
height: 100dvh;
overflow: hidden;
display: flex;
flex-direction: column;
}

/* ─── SCREENS ─── */
.screen { display: none; flex-direction: column; height: 100dvh; overflow: hidden; }
.screen.active { display: flex; }

/* ─── SPLASH ─── */
#splash {
background: radial-gradient(ellipse at 50% 30%, #3d1a00 0%, #0e0600 70%);
align-items: center;
justify-content: center;
gap: 24px;
position: relative;
}
#splash::before {
content: ‘’;
position: absolute;
inset: 0;
background: repeating-linear-gradient(
45deg, transparent, transparent 40px,
rgba(200,134,10,0.03) 40px, rgba(200,134,10,0.03) 41px
);
}
.logo-wrap { text-align: center; position: relative; z-index: 1; }
.logo-icon { font-size: 80px; line-height: 1; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.logo-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 52px;
letter-spacing: 4px;
background: linear-gradient(135deg, var(–gold-light), var(–gold));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}
.logo-sub { color: var(–text-muted); font-size: 14px; letter-spacing: 2px; margin-top: 4px; }
.splash-btn {
position: relative; z-index: 1;
background: linear-gradient(135deg, var(–gold-light), var(–gold));
color: var(–dark);
border: none;
padding: 18px 48px;
border-radius: 50px;
font-family: ‘Heebo’, sans-serif;
font-size: 18px;
font-weight: 800;
cursor: pointer;
box-shadow: 0 8px 32px rgba(200,134,10,0.4);
transition: transform 0.15s, box-shadow 0.15s;
}
.splash-btn:active { transform: scale(0.96); box-shadow: 0 4px 16px rgba(200,134,10,0.3); }

/* ─── SETTINGS ─── */
#settings {
background: var(–dark);
}
.top-bar {
background: var(–surface);
padding: 16px 20px;
display: flex;
align-items: center;
gap: 12px;
border-bottom: 1px solid rgba(200,134,10,0.15);
flex-shrink: 0;
}
.top-bar-title { font-size: 18px; font-weight: 700; color: var(–gold-light); flex: 1; }
.back-btn {
background: none; border: none; color: var(–gold); font-size: 22px; cursor: pointer; padding: 4px;
}
.settings-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }

.param-card {
background: var(–surface);
border: 1px solid rgba(200,134,10,0.2);
border-radius: var(–radius);
overflow: hidden;
}
.param-card-header {
padding: 14px 18px;
background: rgba(200,134,10,0.08);
display: flex;
align-items: center;
gap: 10px;
border-bottom: 1px solid rgba(200,134,10,0.12);
}
.param-card-icon { font-size: 22px; }
.param-card-title { font-size: 15px; font-weight: 700; color: var(–gold-light); }
.param-card-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }

.range-row { display: flex; gap: 12px; align-items: flex-end; }
.range-field { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.range-field label { font-size: 12px; color: var(–text-muted); font-weight: 600; letter-spacing: 1px; }
.range-field input {
background: var(–surface2);
border: 1.5px solid rgba(200,134,10,0.25);
border-radius: 10px;
color: var(–text);
font-family: ‘Heebo’, sans-serif;
font-size: 16px;
font-weight: 600;
padding: 10px 14px;
width: 100%;
outline: none;
transition: border-color 0.2s;
-webkit-appearance: none;
}
.range-field input:focus { border-color: var(–gold); }
.range-field input::placeholder { color: var(–text-muted); opacity: 0.5; }
.unit-label { color: var(–text-muted); font-size: 13px; padding-bottom: 12px; flex-shrink: 0; }

/* ripen slider */
.ripen-row { display: flex; flex-direction: column; gap: 8px; }
.ripen-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(–text-muted); }
.ripen-track {
height: 8px; border-radius: 99px;
background: linear-gradient(to left, #c8860a, #7aaf2a, #2d6b1a);
position: relative;
}
.ripen-handles { position: relative; height: 28px; }
.ripen-handle {
position: absolute; top: 0;
width: 28px; height: 28px;
background: var(–gold-light);
border: 3px solid white;
border-radius: 50%;
cursor: grab;
transform: translateX(50%);
box-shadow: 0 2px 8px rgba(0,0,0,0.5);
display: flex; align-items: center; justify-content: center;
font-size: 10px; font-weight: 800; color: var(–dark);
user-select: none;
touch-action: none;
}
.ripen-val { text-align: center; color: var(–gold-light); font-size: 13px; font-weight: 700; }

.start-scan-btn {
margin: 0 0 8px;
background: linear-gradient(135deg, var(–gold-light), var(–gold));
color: var(–dark);
border: none;
padding: 18px;
border-radius: var(–radius);
font-family: ‘Heebo’, sans-serif;
font-size: 17px;
font-weight: 800;
cursor: pointer;
width: 100%;
box-shadow: 0 6px 24px rgba(200,134,10,0.35);
transition: transform 0.15s;
}
.start-scan-btn:active { transform: scale(0.98); }

/* ─── CAMERA ─── */
#camera { position: relative; background: #000; }

#video {
position: absolute;
inset: 0;
width: 100%;
height: 100%;
object-fit: cover;
}

.cam-overlay {
position: absolute;
inset: 0;
pointer-events: none;
}

/* corner brackets */
.scan-frame {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
width: min(80vw, 340px);
aspect-ratio: 1;
}
.scan-frame::before, .scan-frame::after,
.sf-bl, .sf-br {
content: ‘’;
position: absolute;
width: 32px; height: 32px;
border-color: var(–gold-light);
border-style: solid;
border-radius: 4px;
}
.scan-frame::before { top:0; right:0; border-width: 3px 3px 0 0; }
.scan-frame::after  { top:0; left:0;  border-width: 3px 0 0 3px; }
.sf-bl { bottom:0; left:0;  border-width: 0 0 3px 3px; }
.sf-br { bottom:0; right:0; border-width: 0 3px 3px 0; }

/* scan line */
.scan-line {
position: absolute;
left: 0; right: 0;
height: 2px;
background: linear-gradient(to left, transparent, var(–gold-light), transparent);
animation: scanAnim 2s linear infinite;
}
@keyframes scanAnim { 0%{top:0} 100%{top:calc(100% - 2px)} }

.cam-top-bar {
position: absolute;
top: 0; left: 0; right: 0;
padding: env(safe-area-inset-top, 12px) 16px 12px;
background: linear-gradient(to bottom, rgba(14,6,0,0.85), transparent);
display: flex;
align-items: center;
gap: 12px;
z-index: 10;
}
.cam-title { font-family: ‘Bebas Neue’, sans-serif; font-size: 22px; letter-spacing: 3px; color: var(–gold-light); flex: 1; }
.cam-btn {
background: rgba(255,255,255,0.12);
border: 1px solid rgba(255,255,255,0.2);
color: white;
border-radius: 50px;
padding: 8px 16px;
font-family: ‘Heebo’, sans-serif;
font-size: 13px;
font-weight: 600;
cursor: pointer;
backdrop-filter: blur(8px);
}

.cam-bottom-bar {
position: absolute;
bottom: 0; left: 0; right: 0;
padding: 16px 20px calc(env(safe-area-inset-bottom, 0px) + 20px);
background: linear-gradient(to top, rgba(14,6,0,0.9), transparent);
display: flex;
align-items: center;
justify-content: center;
gap: 20px;
z-index: 10;
}

.capture-btn {
width: 72px; height: 72px;
border-radius: 50%;
background: linear-gradient(135deg, var(–gold-light), var(–gold));
border: 4px solid rgba(255,255,255,0.3);
cursor: pointer;
box-shadow: 0 0 0 2px var(–gold-light), 0 8px 24px rgba(200,134,10,0.5);
transition: transform 0.15s;
display: flex; align-items: center; justify-content: center;
font-size: 28px;
}
.capture-btn:active { transform: scale(0.92); }

/* params mini-badge */
.params-badge {
position: absolute;
bottom: 110px;
left: 50%;
transform: translateX(-50%);
background: rgba(14,6,0,0.8);
border: 1px solid rgba(200,134,10,0.3);
border-radius: 50px;
padding: 6px 16px;
font-size: 12px;
color: var(–text-muted);
backdrop-filter: blur(8px);
white-space: nowrap;
z-index: 10;
}
.params-badge span { color: var(–gold-light); font-weight: 700; }

/* ─── RESULT OVERLAY ─── */
#result-overlay {
position: fixed;
inset: 0;
background: rgba(14,6,0,0.96);
z-index: 100;
display: none;
flex-direction: column;
overflow-y: auto;
}
#result-overlay.show { display: flex; }

.result-top {
padding: 20px;
display: flex;
align-items: center;
gap: 12px;
border-bottom: 1px solid rgba(200,134,10,0.15);
flex-shrink: 0;
}
.result-title { font-size: 18px; font-weight: 700; flex: 1; }
.close-result {
background: none; border: none; color: var(–text-muted); font-size: 26px; cursor: pointer; padding: 4px;
}

.result-img-wrap {
position: relative;
flex-shrink: 0;
max-height: 38vh;
overflow: hidden;
background: #000;
}
#result-img { width: 100%; height: 100%; object-fit: contain; }

/* date boxes overlaid */
.date-box {
position: absolute;
border-radius: 8px;
border: 2px solid;
padding: 2px 6px;
font-size: 10px;
font-weight: 700;
backdrop-filter: blur(4px);
pointer-events: none;
display: flex;
flex-direction: column;
align-items: center;
gap: 1px;
}
.date-box.pass { border-color: var(–success); background: rgba(76,175,80,0.2); color: var(–success); }
.date-box.fail { border-color: var(–fail); background: rgba(229,57,53,0.2); color: var(–fail); }
.date-box-label { font-size: 8px; opacity: 0.8; }

.result-body { padding: 16px 20px; flex: 1; display: flex; flex-direction: column; gap: 16px; }

.summary-row {
display: flex;
gap: 10px;
}
.summary-chip {
flex: 1;
background: var(–surface);
border-radius: 12px;
padding: 12px;
text-align: center;
border: 1px solid rgba(200,134,10,0.2);
}
.summary-chip-num { font-size: 28px; font-weight: 900; line-height: 1; }
.summary-chip-label { font-size: 11px; color: var(–text-muted); margin-top: 4px; }
.chip-pass .summary-chip-num { color: var(–success); }
.chip-fail .summary-chip-num { color: var(–fail); }
.chip-total .summary-chip-num { color: var(–gold-light); }

.date-list { display: flex; flex-direction: column; gap: 10px; }
.date-list-title { font-size: 13px; color: var(–text-muted); font-weight: 700; letter-spacing: 1px; margin-bottom: 2px; }

.date-row {
background: var(–surface);
border-radius: 12px;
padding: 14px 16px;
display: flex;
align-items: center;
gap: 12px;
border-right: 3px solid transparent;
}
.date-row.pass { border-right-color: var(–success); }
.date-row.fail { border-right-color: var(–fail); }

.date-row-idx {
width: 28px; height: 28px;
border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-size: 12px; font-weight: 800;
flex-shrink: 0;
}
.pass .date-row-idx { background: rgba(76,175,80,0.15); color: var(–success); }
.fail .date-row-idx { background: rgba(229,57,53,0.15); color: var(–fail); }

.date-row-details { flex: 1; }
.date-row-metrics {
display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px;
}
.metric-chip {
font-size: 11px;
background: var(–surface2);
border-radius: 6px;
padding: 2px 8px;
color: var(–text-muted);
}
.metric-chip.highlight { color: var(–gold-light); background: rgba(200,134,10,0.1); }
.metric-chip.bad { color: var(–fail); background: rgba(229,57,53,0.1); }

.date-row-status { font-size: 18px; flex-shrink: 0; }

.fail-reasons { font-size: 11px; color: var(–fail); margin-top: 4px; opacity: 0.8; }

/* ─── LOADING ─── */
#loading-overlay {
position: fixed;
inset: 0;
background: rgba(14,6,0,0.92);
z-index: 200;
display: none;
align-items: center;
justify-content: center;
flex-direction: column;
gap: 20px;
backdrop-filter: blur(4px);
}
#loading-overlay.show { display: flex; }
.spinner {
width: 60px; height: 60px;
border: 3px solid rgba(200,134,10,0.2);
border-top-color: var(–gold-light);
border-radius: 50%;
animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(–text-muted); font-size: 15px; }
.loading-sub { color: rgba(200,134,10,0.5); font-size: 12px; }

/* ─── TOAST ─── */
#toast {
position: fixed;
bottom: 100px; left: 50%; transform: translateX(-50%);
background: var(–surface2);
border: 1px solid rgba(200,134,10,0.3);
border-radius: 50px;
padding: 10px 20px;
font-size: 13px;
color: var(–text);
z-index: 300;
opacity: 0;
transition: opacity 0.3s;
pointer-events: none;
white-space: nowrap;
}
#toast.show { opacity: 1; }

canvas { display: none; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(200,134,10,0.3); border-radius: 2px; }
</style>

<script>
// ── State ──────────────────────────────────────────────
let stream = null;
let facingMode = 'environment';
let params = {};

// ── Ripeness Slider ────────────────────────────────────
(function initRipenSlider() {
  const track = document.getElementById('ripenTrack');
  const handles = document.getElementById('ripenHandles');
  const lowH = document.getElementById('ripenLow');
  const highH = document.getElementById('ripenHigh');
  const display = document.getElementById('ripenValDisplay');
  let dragging = null;

  function setHandle(el, val) {
    const v = Math.max(1, Math.min(10, val));
    el.dataset.val = v;
    el.textContent = v;
    const pct = ((v - 1) / 9) * 100;
    el.style.right = `calc(${pct}% - 14px)`;
    el.style.left = 'auto';
  }

  function updateDisplay() {
    const lo = parseInt(lowH.dataset.val);
    const hi = parseInt(highH.dataset.val);
    display.textContent = `טווח: ${Math.min(lo,hi)} – ${Math.max(lo,hi)}`;
  }

  setHandle(lowH, 3);
  setHandle(highH, 7);
  updateDisplay();

  function onStart(e, el) {
    dragging = el;
    e.preventDefault();
  }

  function onMove(e) {
    if (!dragging) return;
    const rect = handles.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const pct = 1 - Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    const val = Math.round(1 + pct * 9);
    setHandle(dragging, val);
    updateDisplay();
  }

  function onEnd() { dragging = null; }

  lowH.addEventListener('mousedown', e => onStart(e, lowH));
  highH.addEventListener('mousedown', e => onStart(e, highH));
  lowH.addEventListener('touchstart', e => onStart(e, lowH), { passive: false });
  highH.addEventListener('touchstart', e => onStart(e, highH), { passive: false });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchend', onEnd);
})();

// ── Screen helpers ─────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goSettings() { showScreen('settings'); }

function getParams() {
  const lo = parseInt(document.getElementById('ripenLow').dataset.val);
  const hi = parseInt(document.getElementById('ripenHigh').dataset.val);
  return {
    lenMin: parseFloat(document.getElementById('lenMin').value) || 30,
    lenMax: parseFloat(document.getElementById('lenMax').value) || 60,
    widMin: parseFloat(document.getElementById('widMin').value) || 18,
    widMax: parseFloat(document.getElementById('widMax').value) || 35,
    wtMin:  parseFloat(document.getElementById('wtMin').value)  || 8,
    wtMax:  parseFloat(document.getElementById('wtMax').value)  || 25,
    ripenMin: Math.min(lo, hi),
    ripenMax: Math.max(lo, hi),
  };
}

// ── Camera ─────────────────────────────────────────────
async function startCamera() {
  params = getParams();
  showScreen('camera');
  document.getElementById('paramsBadge').innerHTML =
    `📏 ${params.lenMin}–${params.lenMax}מ"מ &nbsp;|&nbsp; ⚖️ ${params.wtMin}–${params.wtMax}ג &nbsp;|&nbsp; 🌡️ ${params.ripenMin}–${params.ripenMax}`;

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
  } catch (err) {
    toast('שגיאת מצלמה: ' + err.message);
    showScreen('settings');
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  showScreen('settings');
}

async function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  if (stream) { stream.getTracks().forEach(t => t.stop()); }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
  } catch {}
}

// ── Capture & Analyze ──────────────────────────────────
async function captureAndAnalyze() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const base64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

  showLoading(true);

  try {
    const result = await analyzeWithClaude(base64, params);
    showLoading(false);
    showResult(base64, result);
  } catch (err) {
    showLoading(false);
    toast('שגיאה בניתוח: ' + err.message);
  }
}

// ── Claude API ─────────────────────────────────────────
async function analyzeWithClaude(imageBase64, p) {
  const prompt = `
אתה מומחה לבדיקת תמרים. נתח את התמונה ומצא את כל התמרים הגלויים.

עבור כל תמר החזר JSON בפורמט הבא (מערך של אובייקטים):

{
  "dates": [
    {
      "id": 1,
      "length_mm": <אורך משוער במ"מ, מספר>,
      "width_mm": <רוחב משוער במ"מ, מספר>,
      "weight_g": <משקל משוער בגרמים, מספר>,
      "ripeness": <רמת שילפוח/בשלות מ-1 עד 10, מספר שלם>,
      "ripeness_desc": <תיאור קצר בעברית של המראה>,
      "bbox_pct": { "x": <0-100>, "y": <0-100>, "w": <0-100>, "h": <0-100> },
      "confidence": <אחוז ביטחון 0-100>
    }
  ],
  "scene_notes": "<הערות כלליות על הסצנה בעברית>"
}

פרמטרי הסינון שהמשתמש הגדיר:
- אורך: ${p.lenMin}–${p.lenMax} מ"מ
- רוחב: ${p.widMin}–${p.widMax} מ"מ
- משקל: ${p.wtMin}–${p.wtMax} גרם
- שילפוח: ${p.ripenMin}–${p.ripenMax} (מ-10)

bbox_pct: אחוזים מגודל התמונה (x,y = פינה שמאל-עליונה).
החזר רק JSON, ללא טקסט נוסף.
`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imageBase64 } },
          { type: 'text', text: prompt }
        ]
      }]
    })
  });

  if (!res.ok) {
    const e = await res.json();
    throw new Error(e.error?.message || 'API error');
  }

  const data = await res.json();
  const raw = data.content.map(b => b.text || '').join('');
  const clean = raw.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

// ── Show Result ────────────────────────────────────────
function showResult(imageBase64, data) {
  const dates = data.dates || [];
  const p = params;

  // Classify each date
  const classified = dates.map(d => {
    const fails = [];
    if (d.length_mm < p.lenMin || d.length_mm > p.lenMax)
      fails.push(`אורך ${d.length_mm}מ"מ (צריך ${p.lenMin}–${p.lenMax})`);
    if (d.width_mm < p.widMin || d.width_mm > p.widMax)
      fails.push(`רוחב ${d.width_mm}מ"מ (צריך ${p.widMin}–${p.widMax})`);
    if (d.weight_g < p.wtMin || d.weight_g > p.wtMax)
      fails.push(`משקל ${d.weight_g}ג (צריך ${p.wtMin}–${p.wtMax})`);
    if (d.ripeness < p.ripenMin || d.ripeness > p.ripenMax)
      fails.push(`שילפוח ${d.ripeness}/10 (צריך ${p.ripenMin}–${p.ripenMax})`);
    return { ...d, pass: fails.length === 0, fails };
  });

  const passCount = classified.filter(d => d.pass).length;
  const failCount = classified.length - passCount;

  // Image with overlays
  const imgWrap = document.getElementById('resultImgWrap');
  const img = document.getElementById('result-img');
  img.src = 'data:image/jpeg;base64,' + imageBase64;

  // Remove old boxes
  imgWrap.querySelectorAll('.date-box').forEach(el => el.remove());

  img.onload = () => {
    const iw = imgWrap.offsetWidth;
    const ih = img.offsetHeight;
    classified.forEach(d => {
      if (!d.bbox_pct) return;
      const b = d.bbox_pct;
      const el = document.createElement('div');
      el.className = 'date-box ' + (d.pass ? 'pass' : 'fail');
      el.style.left   = (b.x / 100 * iw) + 'px';
      el.style.top    = (b.y / 100 * ih) + 'px';
      el.style.width  = (b.w / 100 * iw) + 'px';
      el.style.height = (b.h / 100 * ih) + 'px';
      el.innerHTML = `<span>${d.pass ? '✓' : '✗'}</span><span class="date-box-label">#${d.id}</span>`;
      imgWrap.appendChild(el);
    });
  };
  if (img.complete) img.onload();

  // Body
  const body = document.getElementById('resultBody');
  body.innerHTML = `
    <div class="summary-row">
      <div class="summary-chip chip-total">
        <div class="summary-chip-num">${classified.length}</div>
        <div class="summary-chip-label">תמרים זוהו</div>
      </div>
      <div class="summary-chip chip-pass">
        <div class="summary-chip-num">${passCount}</div>
        <div class="summary-chip-label">עוברים</div>
      </div>
      <div class="summary-chip chip-fail">
        <div class="summary-chip-num">${failCount}</div>
        <div class="summary-chip-label">נפסלים</div>
      </div>
    </div>
    ${data.scene_notes ? `<div style="color:var(--text-muted);font-size:13px;padding:0 4px">${data.scene_notes}</div>` : ''}
    <div class="date-list">
      <div class="date-list-title">פירוט תמרים</div>
      ${classified.map(d => `
        <div class="date-row ${d.pass ? 'pass' : 'fail'}">
          <div class="date-row-idx">${d.id}</div>
          <div class="date-row-details">
            <div style="font-size:13px;font-weight:700">${d.ripeness_desc || 'תמר'}</div>
            <div class="date-row-metrics">
              <span class="metric-chip ${isInRange(d.length_mm,p.lenMin,p.lenMax)?'highlight':'bad'}">📏 ${d.length_mm}מ"מ</span>
              <span class="metric-chip ${isInRange(d.width_mm,p.widMin,p.widMax)?'highlight':'bad'}">↔ ${d.width_mm}מ"מ</span>
              <span class="metric-chip ${isInRange(d.weight_g,p.wtMin,p.wtMax)?'highlight':'bad'}">⚖️ ${d.weight_g}ג</span>
              <span class="metric-chip ${isInRange(d.ripeness,p.ripenMin,p.ripenMax)?'highlight':'bad'}">🌡️ ${d.ripeness}/10</span>
            </div>
            ${!d.pass ? `<div class="fail-reasons">${d.fails.join(' • ')}</div>` : ''}
          </div>
          <div class="date-row-status">${d.pass ? '✅' : '❌'}</div>
        </div>
      `).join('')}
    </div>
  `;

  document.getElementById('result-overlay').classList.add('show');
}

function isInRange(v, min, max) { return v >= min && v <= max; }

function closeResult() {
  document.getElementById('result-overlay').classList.remove('show');
}

// ── UI helpers ─────────────────────────────────────────
function showLoading(v) {
  document.getElementById('loading-overlay').classList.toggle('show', v);
}

function toast(msg, dur = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}
</script>
